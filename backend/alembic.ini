# Alembic Configuration for PrintShelf
# sqlalchemy.url is intentionally empty - env.py reads DATABASE_URL at runtime

[alembic]
script_location = alembic
prepend_sys_path = .

# Migration file naming: YYYYMMDD_revisionid_slug.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

truncate_slug_length = 40

output_encoding = utf-8

sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
