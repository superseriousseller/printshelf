<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Offline — PrintShelf</title>
    <meta name="theme-color" content="#0f1115">
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #0f1115; color: #e8e9ed; text-align: center; padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .wrap { max-width: 420px; }
        .glyph { font-size: 3.5rem; margin-bottom: 12px; }
        h1 { font-size: 1.4rem; margin: 0 0 10px; }
        p { color: #9ba0aa; line-height: 1.5; margin: 0 0 24px; }
        button {
            background: #ff6a3d; color: #fff; border: none; border-radius: 12px;
            padding: 12px 24px; font-size: 1rem; font-weight: 600; cursor: pointer; min-height: 44px;
        }
        button:active { background: #e85a2d; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="glyph">📡</div>
        <h1>You're offline</h1>
        <p>PrintShelf needs a connection to load your shelf. Check your network and try again — anything you've already loaded is still cached.</p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
